body:
  text: 大周三藏實叉難陀奉制譯如是我聞一時佛在王舍城耆闍崛山與大比丘衆及大菩薩衆俱爾時世尊告諸比丘有陀羅尼名百千印汝等應當受持所謂歸命面貌廣大頂出真金光明幢如來歸命釋迦牟尼如來應正等覺即説根本陀羅尼曰怛姪他唵一部地部地部地部地二薩婆怛他揭多衢折囉三馱囉馱囉四訶囉訶囉五跋訶囉跋訶囉六摩訶菩提質多七炷魯炷魯八設多囉濕彌珊招地羝九薩婆怛他揭多遏地使咃那阿毗色羝十衢儜衢那跋羝十一部陀衢那阿婆婆上聲西十二弭禮弭禮十三伽伽上聲那怛犁薩婆怛他揭多阿地史恥羝納婆娑怛犁十四閃麼閃麼跋閃麼跋閃麼十五薩婆播波跋閃麼寧十六薩婆播波毗戍燒達寧十七虎盧虎盧十八菩提末伽三鉢囉瑟恥羝十九薩婆怛他揭多鉢囉羝瑟恥多戍遞娑婆訶此是根本陀羅尼唵一薩婆怛他揭多毗婆枳羝二社耶社耶娑婆訶此是陀羅尼心呪唵一虎嚧虎嚧社耶目佉娑婆訶此是隨心呪若有比丘比丘尼優婆塞優婆夷及餘淨信善男子善女人等能造一塔書寫此百千印陀羅尼置其中者造此一塔所得功德如造百千塔功德無異佛説此經已彼諸比丘及菩薩衆天人阿修羅等聞佛所説皆大歡喜信受奉行
